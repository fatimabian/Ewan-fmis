<article class="formset-row{% if form.errors %} has-errors{% endif %}" data-form-row>
  <div class="formset-row-heading"><h3><span class="row-number">{{ row_number }}</span> Crop / Commodity</h3><button type="button" class="remove-form-row" aria-label="Remove crop"><i class="bi bi-trash"></i> Remove</button></div>
  <span class="delete-control">{{ form.DELETE }}</span>
  <div class="registration-grid four">
    {% for field in form %}{% if field.name != "DELETE" %}{% include "farmers/registration_field.html" with field=field %}{% endif %}{% endfor %}
  </div>
</article>
