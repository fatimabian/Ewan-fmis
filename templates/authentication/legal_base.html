{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block legal_title %}FMIS Legal Information{% endblock %}</title>
  <style>:root{--green:#087443;--green-light:#18a364;--ink:#17233a;--muted:#5d6c7d;--line:#dce7e0}*{box-sizing:border-box}body{margin:0;background:#f5f8f6;color:var(--ink);font-family:Arial,Helvetica,sans-serif;line-height:1.65}.legal-nav{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:15px max(5vw,24px);background:linear-gradient(105deg,#142738,#183d36);color:#fff;border-bottom:3px solid var(--green-light);box-shadow:0 5px 18px #102a2130}.legal-nav a{color:#fff;text-decoration:none}.legal-brand{display:flex;align-items:center;gap:11px}.legal-brand-mark{display:grid;place-items:center;min-width:52px;height:38px;padding:0 10px;border-radius:8px;background:var(--green);font-size:15px;font-weight:900;letter-spacing:.7px;box-shadow:inset 0 0 0 1px #ffffff20}.legal-brand-copy{display:grid;line-height:1.18}.legal-brand-copy strong{font-size:14px;letter-spacing:.2px}.legal-brand-copy small{margin-top:3px;color:#c5d7d1;font-size:11px;font-weight:500}.legal-back{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid #46bc81;border-radius:8px;background:var(--green);font-size:12px;font-weight:800;box-shadow:0 4px 12px #051a1240;transition:background .18s ease,transform .18s ease,box-shadow .18s ease}.legal-back:hover,.legal-back:focus{background:var(--green-light);transform:translateY(-1px);box-shadow:0 6px 15px #051a1255;outline:2px solid #b8f0d3;outline-offset:2px}.legal-back-arrow{font-size:16px;line-height:1}.legal-page{width:min(900px,calc(100% - 32px));margin:36px auto;padding:clamp(24px,5vw,54px);background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 35px #1836250c}.legal-page h1{margin:0 0 4px;font-size:clamp(30px,5vw,45px)}.legal-updated{color:var(--muted);font-size:13px}.legal-page h2{margin-top:30px;color:var(--green);font-size:19px}.legal-page li{margin:7px 0}.legal-contact{padding:18px;border-left:4px solid var(--green);background:#f0f8f3}.legal-footer{padding:25px;text-align:center;color:var(--muted);font-size:12px}.legal-footer a{color:var(--green)}@media(max-width:540px){.legal-nav{padding:12px 16px}.legal-brand-copy small{display:none}.legal-back{padding:9px 12px}.legal-page{margin-top:22px}}</style>
  <link rel="stylesheet" href="{% static 'css/typography.css' %}">
</head>
<body><nav class="legal-nav" aria-label="Legal page navigation"><a class="legal-brand" href="{% url 'authentication:landing' %}"><span class="legal-brand-mark">FMIS</span><span class="legal-brand-copy"><strong>Farmer Management Information System</strong><small>Office for Agricultural Services · Rosario, Batangas</small></span></a><a class="legal-back" href="{% url 'authentication:landing' %}"><span class="legal-back-arrow" aria-hidden="true">←</span> Back to Home</a></nav><main class="legal-page">{% block legal_content %}{% endblock %}</main><footer class="legal-footer"><a href="{% url 'authentication:privacy' %}">Privacy Notice</a> · <a href="{% url 'authentication:terms' %}">Terms of Use</a></footer></body>
</html>
